<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantor Hukum Bina Satria Muda</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #0a0f24;
      color: #f5f5f5;
    }
    header {
      display: flex;
      align-items: center;
      padding: 15px 30px;
      background-color: #0d132c;
    }
    header img {
      height: 60px;
      margin-right: 15px;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    header p {
      margin: 0;
      font-size: 14px;
      color: gold;
    }
    section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }
    .team-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 20px;
    }
    .team-member {
      background-color: #11152e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      width: 250px;
    }
    .team-member img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .team-info h3 {
      margin: 0 0 5px;
      font-size: 18px;
    }
    .team-info p {
      margin: 0;
      font-size: 14px;
      color: gold;
    }
    footer {
      background-color: #0d132c;
      text-align: center;
      padding: 15px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <img src="lv_0_20250715214322.gif" alt="Logo BSM" />
    <div>
      <h1>Kantor Hukum BINA SATRIA MUDA</h1>
      <p>KONSULTASI GRATIS</p>
    </div>
  </header>

  <section>
    <h2 style="text-align: center;">Tim Advokasi</h2>
    <div class="team-grid">

      <div class="team-member">
        <img src="Muhammad Husnul Yakin. S.H. - Advokat.jpg" alt="M. Husnul Y., S.H." />
        <div class="team-info">
          <h3>M. Husnul Y., S.H.</h3>
          <p>Advokat</p>
        </div>
      </div>

      <div class="team-member">
        <img src="SAIDIL ALIM, S.H. - Advokat.jpg" alt="Saidil Alim, S.H." />
        <div class="team-info">
          <h3>Saidil Alim, S.H.</h3>
          <p>Advokat</p>
        </div>
      </div>

      <div class="team-member">
        <img src="Yusuf, S.H., M.Kn. - Advokat.jpg" alt="Yusuf, S.H., M.Kn." />
        <div class="team-info">
          <h3>Yusuf, S.H., M.Kn.</h3>
          <p>Advokat</p>
        </div>
      </div>

    </div>
  </section>

  <footer>
    &copy; 2025 Kantor Hukum Bina Satria Muda. Seluruh hak cipta dilindungi.
  </footer>

</body>
</html>
